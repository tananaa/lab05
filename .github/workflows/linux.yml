name: Linux CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [ gcc, clang ]
    steps:
      - uses: actions/checkout@v4
      - name: Configure CMake
        env:
          CC: ${{ matrix.compiler }}
          CXX: ${{ (matrix.compiler == 'clang') && 'clang++' || 'g++' }}
        run: cmake -B build -S .
      - name: Build
        run: cmake --build build
